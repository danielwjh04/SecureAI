name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python — lint, type-check, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Lean install: the ML wheels (requirements-ml.txt) are lazy-imported and
      # gated, so the full suite runs deterministic-only without them.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy --strict)
        run: mypy secureSG tests scripts
      - name: Tests + coverage floor
        run: pytest

  frontend:
    name: Frontend — lint, type-check, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm run test:run
      - name: Build
        run: npm run build
