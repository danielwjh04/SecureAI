name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secureai:
    name: SecureAI Worker, lint, type-check, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secureai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: secureai/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm run test:run

  scanner:
    name: Scanner SPA, lint, type-check, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scanner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: scanner/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm run test:run
      - name: Build
        run: npm run build
